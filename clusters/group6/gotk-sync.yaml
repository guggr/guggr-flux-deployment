apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guggr-git
  namespace: group6
spec:
  interval: 1m
  url: https://github.com/guggr/guggr-flux-deployment
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guggr-config
  namespace: group6
spec:
  interval: 5m
  path: ./apps/guggr
  prune: true
  sourceRef:
    kind: GitRepository
    name: guggr-git
  wait: true
