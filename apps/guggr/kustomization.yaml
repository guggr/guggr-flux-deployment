apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: group6
resources:
  - helmdeploy.yaml
  - alert.yaml
patches:
  - patch: |-
      - op: replace
        path: /metadata/namespace
        value: group6
    target:
      kind: .*
      name: .*
      version: v1
configMapGenerator:
  - name: guggr-helm-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled
  annotations:
    note: Generated via kustomize
